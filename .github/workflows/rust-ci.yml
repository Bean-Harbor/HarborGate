name: HarborGate Rust CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "harborgate-*"
      - "v*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout HarborGate
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-harborgate-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust/harborgate/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-harborgate-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test

      - name: Build HarborGate release binary
        run: cargo build --release --bin harborgate

      - name: Upload HarborGate binary
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: harborgate-linux-x86_64-${{ github.sha }}
          path: target/release/harborgate
          if-no-files-found: error
          retention-days: 14
